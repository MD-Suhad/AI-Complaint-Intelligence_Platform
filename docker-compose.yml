version: '3.9'
services:
  complaint-service:
    build:
      context: ./services/complaint-service
      dockerfile: Dockerfile
    ports:
      - '8080:8080'
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/complaintsdb
      SPRING_DATASOURCE_USERNAME: ai_user
      SPRING_DATASOURCE_PASSWORD: ai_pass
    depends_on:
      - postgres

  analysis-service:
    build:
      context: ./services/analysis-service
      dockerfile: Dockerfile
    ports:
      - '8081:8081'
    depends_on:
      - complaint-service

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: complaintsdb
      POSTGRES_USER: ai_user
      POSTGRES_PASSWORD: ai_pass
    ports:
      - '5432:5432'
    volumes:
      - postgres-data:/var/lib/postgresql/data

  frontend:
    build:
      context: ./frontend
    ports:
      - '4173:4173'
    depends_on:
      - complaint-service

volumes:
  postgres-data:
