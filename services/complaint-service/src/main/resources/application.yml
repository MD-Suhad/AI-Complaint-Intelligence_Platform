spring:
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://postgres:5432/complaintsdb}
    username: ${SPRING_DATASOURCE_USERNAME:ai_user}
    password: ${SPRING_DATASOURCE_PASSWORD:ai_pass}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true

server:
  port: 8080
