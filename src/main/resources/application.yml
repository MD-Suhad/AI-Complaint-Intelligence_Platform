spring:
  datasource:
    url: jdbc:postgresql://postgres:5432/complaintsdb
    username: ai_user
    password: ai_pass
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true

server:
  port: 8080
